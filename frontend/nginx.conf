server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api/ {
        # Try internal Docker hostname first, fallback to external backend
        set $backend_upstream "http://fastapi_app:8000";
        # If backend container is not available, use the external IP (production)
        # proxy_pass http://backend:8000/;

        proxy_pass $backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Debugging headers
        add_header X-Proxy-By "nginx" always;
        add_header X-Upstream "$backend_upstream" always;

        # Error handling
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_redirect off;
    }

    location / {
        try_files $uri /index.html;
    }
}

